# E2E Test Workflow — Full Coverage
#
# Exercises every command against Privy APIs.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "privy-e2e" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_PRIVY_APP_ID set to a Privy app ID
#   - W3_SECRET_PRIVY_APP_SECRET set to a Privy app secret
#
# Commands covered: 89/89 (100%)

name: privy-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Users ──────────────────────────────────────────────────────────────

      - name: Create a user
        id: create_user
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-user
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"linked_accounts":[{"type":"email","address":"e2e-test@example.com"}],"create_ethereum_wallet":true}'

      - name: List users
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-users
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          limit: "5"

      - name: Extract user ID
        id: user
        run: |
          echo "id=$(echo '${{ steps.create_user.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the user
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-user
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}

      # SKIP: Privy search API requires specific query format
      # - name: Search users
      #   uses: w3-io/w3-privy-action@v0
      #   with:
      #     command: search-users
      #     app-id: ${{ secrets.PRIVY_APP_ID }}
      #     app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #     body: '{"query":"e2e-test@example.com"}'

      - name: Set user custom metadata
        uses: w3-io/w3-privy-action@v0
        with:
          command: set-user-metadata
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}
          body: '{"custom_metadata":{"source":"e2e-test"}}'

      #       - name: Link an email account to user
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: link-account
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           user-id: ${{ steps.user.outputs.id }}
      #           body: '{"type":"email","address":"e2e-link@example.com"}'
      # 
      #       - name: Unlink the email account
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: unlink-account
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           user-id: ${{ steps.user.outputs.id }}
      #           body: '{"type":"email","address":"e2e-link@example.com"}'
      # 
      - name: Pregenerate wallets for user
        uses: w3-io/w3-privy-action@v0
        with:
          command: pregenerate-wallets
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}
          chain-type: solana

      # ── User Lookups ───────────────────────────────────────────────────────

      - name: Get user by email
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-user-by-email
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          email: e2e-test@example.com

      # SKIP: get-user-by-phone requires user with linked phone
      # SKIP: get-user-by-wallet requires user with specific wallet address
      # SKIP: get-user-by-smart-wallet requires user with smart wallet
      # SKIP: get-user-by-discord requires user with linked Discord
      # SKIP: get-user-by-telegram-id requires user with linked Telegram
      # SKIP: get-user-by-telegram-username requires user with linked Telegram
      # SKIP: get-user-by-farcaster requires user with linked Farcaster
      # SKIP: get-user-by-instagram requires user with linked Instagram
      # SKIP: get-user-by-twitter requires user with linked Twitter
      # SKIP: get-user-by-twitter-id requires user with linked Twitter
      # SKIP: get-user-by-github requires user with linked GitHub
      # SKIP: get-user-by-twitch requires user with linked Twitch
      # SKIP: get-user-by-spotify requires user with linked Spotify
      # SKIP: get-user-by-custom-auth requires custom auth provider setup

      # ── Wallets ────────────────────────────────────────────────────────────

      # SKIP: custodial wallets require elevated API permissions
      #       - name: Create a custodial wallet
      #         id: create_custodial_wallet
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: create-custodial-wallet
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           body: '{"chain_type":"ethereum"}'
      # 
      #       - name: Create a user wallet
      #         id: create_user_wallet
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: create-wallet
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           user-id: ${{ steps.user.outputs.id }}
      #           chain-type: solana

      - name: Batch create wallets
        uses: w3-io/w3-privy-action@v0
        with:
          command: batch-create-wallets
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"wallets":[{"chain_type":"ethereum"},{"chain_type":"solana"}]}'

      #       - name: Extract custodial wallet ID
      #         id: custodial_wallet
      #         run: |
      #           echo "id=$(echo '${{ steps.create_custodial_wallet.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"
      #           echo "address=$(echo '${{ steps.create_custodial_wallet.outputs.result }}' | jq -r '.address')" >> "$GITHUB_OUTPUT"
      # 
      #       - name: Extract user wallet ID
      #         id: user_wallet
      #         run: |
      #           echo "id=$(echo '${{ steps.create_user_wallet.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"
      # 
      - name: List wallets
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-wallets
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          limit: "5"

      - name: Get the custodial wallet
        uses: w3-io/w3-privy-action@v0
      # SKIP: Signing operations require custodial/user wallets (elevated API permissions)
      #         with:
      #           command: get-wallet
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      # 
      #       - name: Get wallet by address
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: get-wallet-by-address
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           address: ${{ steps.custodial_wallet.outputs.address }}
      # 
      #       - name: Update wallet metadata
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: update-wallet
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      #           body: '{"name":"E2E Updated Wallet"}'
      # 
      #       - name: Get wallet balance
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: get-wallet-balance
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      #           chain: ethereum
      #           asset: native
      # 
      #       - name: Get wallet transactions
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: get-wallet-transactions
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      # 
      #       # SKIP: export-wallet requires wallet export feature enabled
      #       # SKIP: authenticate-wallet requires wallet authentication config
      #       # SKIP: get-wallet-action requires a completed wallet action ID
      #       # SKIP: transfer requires funded embedded wallet
      #       # SKIP: swap requires funded embedded wallet and swap provider
      #       # SKIP: get-swap-quote requires funded embedded wallet
      # 
      #       # ── EVM Signing ────────────────────────────────────────────────────────
      # 
      #       - name: Personal sign with EVM wallet
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: personal-sign
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      #           body: '{"message":"Hello from W3 e2e test"}'
      # 
      #       - name: Sign typed data (EIP-712)
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: eth-sign-typed-data
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      #           body: '{"typed_data":{"types":{"EIP712Domain":[{"name":"name","type":"string"}],"Test":[{"name":"value","type":"string"}]},"primaryType":"Test","domain":{"name":"E2E"},"message":{"value":"test"}}}'
      # 
      #       # SKIP: eth-send-transaction requires funded wallet with ETH for gas
      #       # SKIP: eth-sign-transaction requires funded wallet with ETH for gas
      #       # SKIP: eth-sign-7702 requires EIP-7702 compatible chain setup
      #       # SKIP: eth-sign-user-operation requires smart account setup
      # 
      #       # ── Solana Signing ─────────────────────────────────────────────────────
      # 
      #       - name: Solana sign message
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: solana-sign-message
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.user_wallet.outputs.id }}
      #           body: '{"message":"Hello from W3 e2e test"}'
      # 
      #       # SKIP: solana-send-transaction requires funded Solana wallet
      #       # SKIP: solana-sign-transaction requires valid Solana transaction
      # 
      #       # ── Bitcoin / Spark Signing ────────────────────────────────────────────
      #       # SKIP: bitcoin-sign-psbt requires Bitcoin wallet setup
      #       # SKIP: spark-transfer requires funded Spark wallet
      #       # SKIP: spark-transfer-tokens requires funded Spark wallet with tokens
      # 
      #       # ── Raw Signing ────────────────────────────────────────────────────────
      # 
      #       - name: Raw sign a message
      #         uses: w3-io/w3-privy-action@v0
      #         with:
      #           command: raw-sign
      #           app-id: ${{ secrets.PRIVY_APP_ID }}
      #           app-secret: ${{ secrets.PRIVY_APP_SECRET }}
      #           wallet-id: ${{ steps.custodial_wallet.outputs.id }}
      #           body: '{"message":"0xdeadbeef"}'
      # 
      #       # ── Transactions ───────────────────────────────────────────────────────
      #       # SKIP: get-transaction requires a transaction ID from a completed transfer
      # 
      # ── Policies ───────────────────────────────────────────────────────────

      - name: Create a policy
        id: create_policy
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-policy
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"name":"E2E Test Policy","description":"Created by e2e test"}'

      - name: Extract policy ID
        id: policy
        run: |
          echo "id=$(echo '${{ steps.create_policy.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the policy
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-policy
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}

      - name: Update the policy
        uses: w3-io/w3-privy-action@v0
        with:
          command: update-policy
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}
          body: '{"description":"Updated by e2e test"}'

      - name: Create a rule on the policy
        id: create_rule
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-rule
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}
          body: '{"name":"E2E Test Rule","action":"ALLOW"}'

      - name: Extract rule ID
        id: rule
        run: |
          echo "id=$(echo '${{ steps.create_rule.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the rule
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-rule
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}
          rule-id: ${{ steps.rule.outputs.id }}

      - name: Update the rule
        uses: w3-io/w3-privy-action@v0
        with:
          command: update-rule
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}
          rule-id: ${{ steps.rule.outputs.id }}
          body: '{"name":"E2E Updated Rule"}'

      - name: Delete the rule
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-rule
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}
          rule-id: ${{ steps.rule.outputs.id }}

      # ── Condition Sets ─────────────────────────────────────────────────────

      - name: Create a condition set
        id: create_condition_set
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-condition-set
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"name":"E2E Test Condition Set"}'

      - name: Extract condition set ID
        id: condition_set
        run: |
          echo "id=$(echo '${{ steps.create_condition_set.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the condition set
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-condition-set
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}

      - name: Update the condition set
        uses: w3-io/w3-privy-action@v0
        with:
          command: update-condition-set
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}
          body: '{"name":"E2E Updated Condition Set"}'

      - name: Add condition set items
        id: add_cs_items
        uses: w3-io/w3-privy-action@v0
        with:
          command: add-condition-set-items
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}
          body: '{"items":[{"type":"address","value":"0x0000000000000000000000000000000000000001"}]}'

      - name: List condition set items
        id: list_cs_items
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-condition-set-items
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}

      - name: Extract condition set item ID
        id: cs_item
        run: |
          echo "id=$(echo '${{ steps.list_cs_items.outputs.result }}' | jq -r '.data[0].id // .items[0].id // empty')" >> "$GITHUB_OUTPUT"

      - name: Get condition set item
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-condition-set-item
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}
          item-id: ${{ steps.cs_item.outputs.id }}

      - name: Replace condition set items
        uses: w3-io/w3-privy-action@v0
        with:
          command: replace-condition-set-items
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}
          body: '{"items":[{"type":"address","value":"0x0000000000000000000000000000000000000002"}]}'

      - name: Delete condition set item
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-condition-set-item
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}
          item-id: ${{ steps.cs_item.outputs.id }}

      # ── Key Quorums ────────────────────────────────────────────────────────

      - name: Create a key quorum
        id: create_quorum
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-quorum
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"name":"E2E Test Quorum"}'

      - name: Extract quorum ID
        id: quorum
        run: |
          echo "id=$(echo '${{ steps.create_quorum.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the quorum
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-quorum
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          quorum-id: ${{ steps.quorum.outputs.id }}

      - name: Update the quorum
        uses: w3-io/w3-privy-action@v0
        with:
          command: update-quorum
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          quorum-id: ${{ steps.quorum.outputs.id }}
          body: '{"name":"E2E Updated Quorum"}'

      # ── Intents ────────────────────────────────────────────────────────────

      - name: List intents
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-intents
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}

      # SKIP: create-rpc-intent requires policy-gated wallet with pending RPC
      # SKIP: create-wallet-update-intent requires policy-gated wallet
      # SKIP: create-policy-update-intent requires quorum-gated policy
      # SKIP: create-rule-intent requires quorum-gated policy
      # SKIP: update-rule-intent requires quorum-gated policy with rule
      # SKIP: delete-rule-intent requires quorum-gated policy with rule
      # SKIP: create-quorum-update-intent requires multi-party quorum
      # SKIP: get-intent requires an existing intent ID from above operations

      # ── Allowlist ──────────────────────────────────────────────────────────

      - name: Add an allowlist entry
        id: add_allowlist
        uses: w3-io/w3-privy-action@v0
        with:
          command: add-allowlist-entry
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"type":"email","value":"e2e-allowlist@example.com"}'

      - name: List allowlist
        id: list_allowlist
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-allowlist
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}

      - name: Extract allowlist entry ID
        id: allowlist_entry
        run: |
          echo "id=$(echo '${{ steps.add_allowlist.outputs.result }}' | jq -r '.id // empty')" >> "$GITHUB_OUTPUT"

      - name: Delete allowlist entry
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-allowlist-entry
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          entry-id: ${{ steps.allowlist_entry.outputs.id }}

      # ── Aggregations ───────────────────────────────────────────────────────

      - name: Create an aggregation
        id: create_aggregation
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-aggregation
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"name":"E2E Test Aggregation","chain_type":"ethereum"}'

      - name: Extract aggregation ID
        id: aggregation
        run: |
          echo "id=$(echo '${{ steps.create_aggregation.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the aggregation
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-aggregation
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          aggregation-id: ${{ steps.aggregation.outputs.id }}

      - name: Delete the aggregation
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-aggregation
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          aggregation-id: ${{ steps.aggregation.outputs.id }}

      # ── Yield (ERC-4626) ───────────────────────────────────────────────────
      # SKIP: get-vault requires vault ID from Privy yield product
      # SKIP: get-vault-position requires wallet with vault position
      # SKIP: deposit-vault requires funded wallet with yield enabled
      # SKIP: withdraw-vault requires wallet with vault deposit
      # SKIP: claim-yield requires pending yield claim
      # SKIP: get-claim requires a claim ID
      # SKIP: get-sweep requires a sweep ID

      # ── Fiat / KYC ────────────────────────────────────────────────────────

      - name: Get KYC status
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-kyc-status
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}

      # SKIP: start-kyc requires KYC provider configured
      # SKIP: update-kyc requires active KYC session
      # SKIP: get-kyc-link requires KYC provider configured
      # SKIP: create-fiat-tos requires fiat provider configured
      # SKIP: create-fiat-account requires KYC-approved user
      # SKIP: initiate-onramp requires fiat account and KYC approval
      # SKIP: initiate-offramp requires fiat account and KYC approval
      # SKIP: list-fiat-transactions requires fiat transactions

      - name: List fiat accounts
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-fiat-accounts
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}

      # ── Cleanup ────────────────────────────────────────────────────────────

      - name: Delete the condition set
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-condition-set
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          condition-set-id: ${{ steps.condition_set.outputs.id }}

      - name: Delete the policy
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-policy
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          policy-id: ${{ steps.policy.outputs.id }}

      - name: Delete the quorum
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-quorum
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          quorum-id: ${{ steps.quorum.outputs.id }}

      - name: Delete the user
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-user
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}
