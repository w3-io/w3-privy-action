# E2E Test Workflow — Privy
#
# Prerequisites:
#   - PRIVY_APP_ID and PRIVY_APP_SECRET set
#
# SKIP: Wallet signing, custodial wallets, policies, rules, condition sets,
# and social account lookups require elevated API permissions or specific
# user state. See RESULTS.md.

name: privy-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create a user
        id: create_user
        uses: w3-io/w3-privy-action@v0
        with:
          command: create-user
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          body: '{"linked_accounts":[{"type":"email","address":"e2e-test@example.com"}],"create_ethereum_wallet":true}'

      - name: List users
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-users
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}

      - name: Extract user ID
        id: user
        run: |
          echo "id=$(echo '${{ steps.create_user.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the user
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-user
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}

      - name: Set user custom metadata
        uses: w3-io/w3-privy-action@v0
        with:
          command: set-user-metadata
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}
          body: '{"custom_metadata":{"e2e_test":true}}'

      - name: Get user by email
        uses: w3-io/w3-privy-action@v0
        with:
          command: get-user-by-email
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          email: e2e-test@example.com

      - name: List wallets
        uses: w3-io/w3-privy-action@v0
        with:
          command: list-wallets
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}

      - name: Delete the test user
        uses: w3-io/w3-privy-action@v0
        with:
          command: delete-user
          app-id: ${{ secrets.PRIVY_APP_ID }}
          app-secret: ${{ secrets.PRIVY_APP_SECRET }}
          user-id: ${{ steps.user.outputs.id }}
