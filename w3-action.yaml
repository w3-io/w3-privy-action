kind: integration
name: Privy
version: 0.1.0
repo: w3-io/w3-privy-action
partner: privy
description:
  Wallet infrastructure — per-user wallets, signing, policies, yield vaults,
  and fiat operations
context:
  'Privy manages wallets on behalf of your users. W3 makes operations on those
  wallets verifiable, auditable, and automated.


  **When to use Privy vs native chain actions:** Use W3''s native ethereum/solana
  chain actions for business-controlled treasury wallets (your keys in W3_SECRET_*).
  Use Privy when you need per-user wallets — each user gets their own wallet, Privy
  holds the keys, your workflows operate on them through consensus.


  **Key value of W3 + Privy:** Privy alone means your server signs transactions —
  single point of trust. Through W3, the same operation goes through validator consensus.
  Multiple independent machines verify every transaction was executed correctly. For
  businesses managing user funds, this is "trust the math" vs "trust our server."


  **Verified batch operations:** Airdrop tokens to thousands of user wallets where
  every transfer is receipted and independently verifiable. Use list-wallets to enumerate,
  then eth-send-transaction or transfer for each.


  **Automated yield:** Scheduled workflows deposit user funds into ERC-4626 vaults,
  claim rewards, rebalance — all receipted. Use deposit-vault, claim-yield, withdraw-vault
  with cron triggers.


  **Cross-platform onboarding:** Create Privy user → KYC via Iron → sanctions screen
  via Chainalysis → fund via Stripe onramp → deposit into yield. Single orchestrated
  flow, every step verified. Use the async-callback cookbook for delivering KYC URLs
  to your frontend.


  **Policy-enforced operations:** Create spending policies with rules (amount limits,
  allowed recipients). W3 adds a second verification layer — the workflow checks the
  policy in consensus before calling Privy.


  **Signing operations use the /rpc endpoint.** Commands like eth-send-transaction,
  personal-sign, solana-sign-message wrap the unified /wallets/{id}/rpc endpoint.
  The body param contains the transaction or message to sign. Use caip2 for chain
  targeting (e.g. "eip155:11155111" for Sepolia, "eip155:1" for mainnet).


  **Transfer vs eth-send-transaction:** transfer is a high-level operation (asset
  name, decimal amount, chain name). eth-send-transaction is raw EVM (hex value, calldata,
  gas). Use transfer for simple token sends, eth-send-transaction for contract interactions.


  **Relevant patterns:** See the approval-gates cookbook for policy-enforced transfers
  (two-workflow pattern until pause-and-resume lands). See the multi-chain-balances
  cookbook for aggregating across user wallets on multiple chains. See the async-callback
  cookbook for delivering KYC URLs and onboarding links. See the fiat-to-onchain cookbook
  for Stripe/Iron onramp → Privy wallet deposit flows.


  27 commands in this registry. Full API reference at https://github.com/w3-io/w3-privy-action.
  Privy docs at docs.privy.io.

  '
commands:
  - name: create-user
    description:
      "Create a user with linked accounts (email, phone, wallet) and optionally
      pre-generate an embedded wallet. Returns user ID (DID).

      "
    inputs:
      body:
        type: object
        required: true
        description:
          'User params. Example: {"linked_accounts": [{"type": "email", "address":
          "user@example.com"}], "create_ethereum_wallet": true}

          '
    outputs:
      result:
        type: object
        description: "{id (DID), linked_accounts, created_at}"
  - name: get-user
    description: Get user by Privy DID.
    inputs:
      user-id:
        type: string
        required: true
        description: Privy DID (did:privy:...)
    outputs:
      result:
        type: object
        description: Full user object with linked_accounts, wallets, metadata
  - name: list-users
    description: List all users (paginated, max 100 per page).
    inputs:
      limit:
        type: number
        required: false
        description: Page size (max 100)
    outputs:
      result:
        type: object
        description: "{data: [users], next_cursor}"
  - name: delete-user
    description: Delete a user and all associated data.
    inputs:
      user-id:
        type: string
        required: true
        description: Privy DID
    outputs:
      result:
        type: object
        description: "{success: true}"
  - name: search-users
    description: Search users by term, email, or phone.
    inputs:
      body:
        type: object
        required: true
        description: "{searchTerm: '...'} or {emails: ['...']} or {phoneNumbers:
          ['...']}"
    outputs:
      result:
        type: object
        description: "{data: [matching users]}"
  - name: get-user-by-email
    description: Lookup a user by their email address.
    inputs:
      email:
        type: string
        required: true
        description: Email address
    outputs:
      result:
        type: object
        description: User object (or error if not found)
  - name: get-user-by-wallet
    description: Lookup a user by their wallet address.
    inputs:
      address:
        type: string
        required: true
        description: Blockchain wallet address
    outputs:
      result:
        type: object
        description: User object (or error if not found)
  - name: create-wallet
    description:
      "Create a server wallet. Supports ethereum, solana, bitcoin-segwit,
      cosmos, stellar, sui, aptos, tron, near, ton, starknet.

      "
    inputs:
      chain-type:
        type: string
        required: false
        description: "Chain type (default: ethereum)"
      body:
        type: object
        required: false
        description: "Optional: {chain_type, owner_id, policy_ids}"
    outputs:
      result:
        type: object
        description: "{id, address, chain_type, created_at}"
  - name: list-wallets
    description: List all wallets with optional filters.
    inputs:
      chain-type:
        type: string
        required: false
        description: Filter by chain
      user-id:
        type: string
        required: false
        description: Filter by user
    outputs:
      result:
        type: object
        description: "{data: [wallets], next_cursor}"
  - name: get-wallet
    description: Get wallet details by ID.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
    outputs:
      result:
        type: object
        description: "{id, address, chain_type, policies, owner}"
  - name: get-wallet-balance
    description:
      "Get wallet balance. Chain values: ethereum, sepolia, arbitrum, base,
      polygon, solana, etc. Asset values: eth, usdc, usdc.e, usdt.

      "
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      chain:
        type: string
        required: true
        description: Chain name (ethereum, sepolia, arbitrum, base, etc.)
      asset:
        type: string
        required: true
        description: Asset (eth, usdc, usdc.e, usdt)
    outputs:
      result:
        type: object
        description: "{balances: [{chain, asset, raw_value, display_values}]}"
  - name: batch-create-wallets
    description: Create multiple wallets in one request.
    inputs:
      body:
        type: object
        required: true
        description: "{wallets: [{chain_type: 'ethereum'}, {chain_type: 'solana'}]}"
    outputs:
      result:
        type: object
        description: "{wallets: [created wallet objects]}"
  - name: eth-send-transaction
    description:
      'Sign and broadcast an EVM transaction. Requires funded wallet for
      gas. Use caip2 to specify the chain (e.g. "eip155:11155111" for Sepolia).

      '
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      caip2:
        type: string
        required: true
        description: CAIP-2 chain ID (eip155:1 = mainnet, eip155:11155111 = Sepolia)
      body:
        type: object
        required: true
        description: "{transaction: {to, value (hex), type: 2, data (optional)}}"
    outputs:
      result:
        type: object
        description: "{data: {hash: '0x...'}}"
  - name: eth-sign-transaction
    description: Sign an EVM transaction without broadcasting. Returns signed tx bytes.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description: "{transaction: {to, value, chain_id (number), type: 2}}"
    outputs:
      result:
        type: object
        description: "{data: {signed_transaction: '0x...'}}"
  - name: personal-sign
    description: Sign a message (EIP-191).
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description: "{message: 'Hello', encoding: 'utf-8'}"
    outputs:
      result:
        type: object
        description: "{data: {signature: '0x...'}}"
  - name: solana-sign-message
    description: Sign a message with a Solana wallet.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Solana wallet ID
      body:
        type: object
        required: true
        description: "{message: '<base64>', encoding: 'base64'}"
    outputs:
      result:
        type: object
        description: "{data: {signature: '...'}}"
  - name: raw-sign
    description: Raw secp256k1 signature over a hash.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description: "{hash: '0x...' (32 bytes hex)}"
    outputs:
      result:
        type: object
        description: "{data: {signature: '0x...'}}"
  - name: transfer
    description:
      "High-level token transfer. Simpler than eth-send-transaction — uses
      asset names and decimal amounts instead of hex.

      "
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description:
          "{source: {asset: \"eth\"|\"usdc\", amount: \"1.5\", chain: \"\
          ethereum_sepolia\"},\n destination: {address: \"0x...\"}}\n"
    outputs:
      result:
        type: object
        description: "{id, status, transaction_hash}"
  - name: create-policy
    description: Create a spending/signing policy with rules.
    inputs:
      body:
        type: object
        required: true
        description:
          "{version: '1.0', name: '...', chain_type: 'ethereum', rules:
          [...]}"
    outputs:
      result:
        type: object
        description: "{id, name, chain_type, rules, created_at}"
  - name: get-policy
    description: Get policy details.
    inputs:
      policy-id:
        type: string
        required: true
        description: Policy ID
    outputs:
      result:
        type: object
        description: Full policy with rules
  - name: delete-policy
    description: Delete a policy.
    inputs:
      policy-id:
        type: string
        required: true
        description: Policy ID
    outputs:
      result:
        type: object
        description: "{success: true}"
  - name: deposit-vault
    description: Deposit assets from a wallet into an ERC-4626 yield vault.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description: Deposit params (vault_id, amount)
    outputs:
      result:
        type: object
        description: Deposit transaction details
  - name: claim-yield
    description: Claim accrued yield rewards from a vault.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description: Claim params (vault_id)
    outputs:
      result:
        type: object
        description: Claim transaction details
  - name: withdraw-vault
    description: Withdraw assets from a yield vault.
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      body:
        type: object
        required: true
        description: Withdraw params (vault_id, amount)
    outputs:
      result:
        type: object
        description: Withdrawal transaction details
  - name: start-kyc
    description: Start KYC verification for a user. Returns verification URL.
    inputs:
      user-id:
        type: string
        required: true
        description: User DID
      body:
        type: object
        required: true
        description: KYC params (provider, data with name, email, address, DOB)
    outputs:
      result:
        type: object
        description: KYC session with status and verification URL
  - name: get-kyc-status
    description: Check KYC verification status.
    inputs:
      user-id:
        type: string
        required: true
        description: User DID
    outputs:
      result:
        type: object
        description: "{status, provider, details}"
  - name: get-wallet-transactions
    description:
      "Get incoming and outgoing transactions for a wallet. Requires both
      chain and asset params.

      "
    inputs:
      wallet-id:
        type: string
        required: true
        description: Wallet ID
      chain:
        type: string
        required: true
        description: Chain (ethereum, sepolia, arbitrum, base, solana, etc.)
      asset:
        type: string
        required: true
        description: Asset (eth, usdc, etc.)
    outputs:
      result:
        type: object
        description: "{data: [transactions], next_cursor}"
